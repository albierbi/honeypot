server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /promtail-data/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push
    timeout: 30s
    backoff_config:
      min_period: 500ms
      max_period: 5m
      max_retries: 10

scrape_configs:

  - job_name: cowrie
    static_configs:
      - targets:
          - localhost
        labels:
          job: cowrie
          __path__: /logs/cowrie/cowrie.json
    pipeline_stages:
      - json:
          expressions:
            timestamp: timestamp
      - timestamp:
          source: timestamp
          format: RFC3339Nano

  - job_name: http-honeypot
    static_configs:
      - targets:
          - localhost
        labels:
          job: http-honeypot
          __path__: /logs/http/http.json
    pipeline_stages:
      - json:
          expressions:
            timestamp: timestamp
      - timestamp:
          source: timestamp
          format: RFC3339Nano
