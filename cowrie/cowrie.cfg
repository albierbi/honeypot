[honeypot]
# Hostname the fake server presents to attackers
hostname = webserver01

# Fake OS version shown in the SSH banner
kernel_version = 5.15.0-91-generic
kernel_build_string = #101-Ubuntu SMP Tue Nov 14 13:30:08 UTC 2023

# Where Cowrie listens inside the container (Docker maps host :22 → container :2222)
listen_endpoints = tcp:2222:interface=0.0.0.0

# Accept any password — the goal is to let attackers in and log what they do
auth_class = AuthRandom
auth_class_parameters = 1, 5, 1

# How many login attempts before accepting (1-5 random, feels realistic)
re_auth_enabled = false

[output_jsonlog]
# Write structured JSON logs — Promtail will read this file
enabled = true
logfile = var/log/cowrie/cowrie.json

[output_textlog]
enabled = true
logfile = var/log/cowrie/cowrie.log
